<svg width="760" height="1520" viewBox="0 0 760 1520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screen" x1="380" y1="44" x2="380" y2="1476" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b1018"/>
      <stop offset="1" stop-color="#0a0a0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="380" cy="660" r="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pack" x1="255" y1="380" x2="505" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#be123c"/>
    </linearGradient>
    <clipPath id="screenClip"><rect x="44" y="44" width="672" height="1432" rx="58"/></clipPath>
  </defs>

  <!-- Device body -->
  <rect x="20" y="20" width="720" height="1480" rx="90" fill="#0b0b12" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>

  <g clip-path="url(#screenClip)">
    <rect x="44" y="44" width="672" height="1432" fill="url(#screen)"/>
    <rect x="44" y="44" width="672" height="1432" fill="url(#glow)"/>

    <!-- Status bar -->
    <text x="92" y="118" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="24" font-weight="600" fill="#ffffff" fill-opacity="0.65">9:41</text>
    <rect x="612" y="100" width="56" height="22" rx="6" fill="#ffffff" fill-opacity="0.5"/>

    <!-- Wordmark -->
    <text x="380" y="232" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="62" font-weight="800" fill="#fbbf24">Ugurpack</text>
    <text x="380" y="282" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="500" fill="#ffffff" fill-opacity="0.6" letter-spacing="2">Open · Catch · Collect</text>

    <!-- Booster pack -->
    <rect x="255" y="380" width="250" height="600" rx="30" fill="url(#pack)"/>
    <rect x="255" y="380" width="250" height="600" rx="30" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
    <polygon points="275,380 360,380 300,980 255,980 255,930" fill="#ffffff" fill-opacity="0.12"/>
    <!-- Pokéball emblem -->
    <g transform="translate(380 632) scale(0.62)">
      <circle r="100" fill="#f8fafc"/>
      <path d="M -100 0 A 100 100 0 0 1 100 0 Z" fill="#ef4444"/>
      <line x1="-97" y1="0" x2="97" y2="0" stroke="#0b0b12" stroke-width="22"/>
      <circle r="100" fill="none" stroke="#0b0b12" stroke-width="8"/>
      <circle r="30" fill="#f8fafc" stroke="#0b0b12" stroke-width="11"/>
    </g>
    <text x="380" y="905" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="3">BOOSTER PACK</text>

    <!-- Shake hint -->
    <rect x="228" y="1120" width="304" height="74" rx="37" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
    <g transform="translate(270 1157)" stroke="#fbbf24" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-8" y="-16" width="26" height="34" rx="5"/>
      <path d="M-20 -8 L -26 -12 M-20 8 L -26 12 M30 -8 L 36 -12 M30 8 L 36 12"/>
    </g>
    <text x="312" y="1167" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="28" font-weight="600" fill="#ffffff">Shake to open</text>

    <text x="380" y="1290" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="24" font-weight="500" fill="#ffffff" fill-opacity="0.45">or swipe across to tear it open</text>
    <g stroke="#ffffff" stroke-opacity="0.4" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M340 1330 l16 16 l-16 16"/>
      <path d="M372 1330 l16 16 l-16 16"/>
      <path d="M404 1330 l16 16 l-16 16"/>
    </g>
  </g>

  <!-- Notch -->
  <rect x="320" y="60" width="120" height="26" rx="13" fill="#000000" fill-opacity="0.6"/>
</svg>
